<div class="container mt-3">
  <div class="col-lg-5 col-md-6">
    <h2 class="text-center mb-3">Add Trip</h2>

    <form *ngIf="addForm" [formGroup]="addForm" (ngSubmit)="onSubmit()">

      <!-- Code -->
      <div class="form-group mb-3">
        <label>Code:</label>
        <input
          type="text"
          class="form-control"
          formControlName="code"
          placeholder="e.g., CAN001"
          [ngClass]="{ 'is-invalid': submitted && f['code'].errors }" />
        <div *ngIf="submitted && f['code'].errors" class="invalid-feedback d-block">
          <div *ngIf="f['code'].errors?.['required']">Trip Code is required</div>
        </div>
      </div>

      <!-- Name -->
      <div class="form-group mb-3">
        <label>Name:</label>
        <input
          type="text"
          class="form-control"
          formControlName="name"
          placeholder="Trip name"
          [ngClass]="{ 'is-invalid': submitted && f['name'].errors }" />
        <div *ngIf="submitted && f['name'].errors" class="invalid-feedback d-block">
          <div *ngIf="f['name'].errors?.['required']">Name is required</div>
        </div>
      </div>

      <!-- Length -->
      <div class="form-group mb-3">
        <label>Length (days):</label>
        <input
          type="number"
          class="form-control"
          formControlName="length"
          placeholder="Number of days"
          [ngClass]="{ 'is-invalid': submitted && f['length'].errors }" />
        <div *ngIf="submitted && f['length'].errors" class="invalid-feedback d-block">
          <div *ngIf="f['length'].errors?.['required']">Length is required</div>
        </div>
      </div>

      <!-- Start -->
      <div class="form-group mb-3">
        <label>Start Date:</label>
        <input
          type="date"
          class="form-control"
          formControlName="start"
          [ngClass]="{ 'is-invalid': submitted && f['start'].errors }" />
        <div *ngIf="submitted && f['start'].errors" class="invalid-feedback d-block">
          <div *ngIf="f['start'].errors?.['required']">Start date is required</div>
        </div>
      </div>

      <!-- Resort -->
      <div class="form-group mb-3">
        <label>Resort:</label>
        <input
          type="text"
          class="form-control"
          formControlName="resort"
          placeholder="Resort name"
          [ngClass]="{ 'is-invalid': submitted && f['resort'].errors }" />
        <div *ngIf="submitted && f['resort'].errors" class="invalid-feedback d-block">
          <div *ngIf="f['resort'].errors?.['required']">Resort is required</div>
        </div>
      </div>

      <!-- Per Person -->
      <div class="form-group mb-3">
        <label>Price (per person):</label>
        <input
          type="number"
          class="form-control"
          formControlName="perPerson"
          placeholder="e.g., 1299"
          [ngClass]="{ 'is-invalid': submitted && f['perPerson'].errors }" />
        <div *ngIf="submitted && f['perPerson'].errors" class="invalid-feedback d-block">
          <div *ngIf="f['perPerson'].errors?.['required']">Price is required</div>
        </div>
      </div>

      <!-- Image -->
      <div class="form-group mb-3">
        <label>Image filename:</label>
        <input
          type="text"
          class="form-control"
          formControlName="image"
          placeholder="e.g., canary-islands.jpg"
          [ngClass]="{ 'is-invalid': submitted && f['image'].errors }" />
        <div *ngIf="submitted && f['image'].errors" class="invalid-feedback d-block">
          <div *ngIf="f['image'].errors?.['required']">Image filename is required</div>
        </div>
      </div>

      <!-- Description -->
      <div class="form-group mb-3">
        <label>Description:</label>
        <textarea
          rows="4"
          class="form-control"
          formControlName="description"
          placeholder="Short description of the trip"
          [ngClass]="{ 'is-invalid': submitted && f['description'].errors }"></textarea>
        <div *ngIf="submitted && f['description'].errors" class="invalid-feedback d-block">
          <div *ngIf="f['description'].errors?.['required']">Description is required</div>
        </div>
      </div>

      <!-- Actions -->
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a class="btn btn-outline-secondary" routerLink="/">Cancel</a>
      </div>
    </form>
  </div>
</div>
