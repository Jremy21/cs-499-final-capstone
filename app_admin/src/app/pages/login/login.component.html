<div class="container" style="max-width:420px">
  <h2>Login</h2>
  <form (ngSubmit)="submit()">
    <div class="mb-3">
      <label>Email</label>
      <input class="form-control" [(ngModel)]="form.email" name="email" type="email" required>
    </div>
    <div class="mb-3">
      <label>Password</label>
      <input class="form-control" [(ngModel)]="form.password" name="password" type="password" required>
    </div>
    <button class="btn btn-primary w-100" type="submit">Login</button>
    <p class="text-danger mt-2" *ngIf="error">{{error}}</p>
  </form>
</div>
