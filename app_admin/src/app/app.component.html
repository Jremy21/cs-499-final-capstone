<nav class="navbar navbar-light bg-light px-3">
  <a class="navbar-brand" routerLink="/">Travlr</a>

  <div class="ms-auto" *ngIf="auth.isLoggedIn(); else loggedOut">
    <span class="me-2">Welcome! {{ auth.getUser()?.name || 'traveler' }} </span>
    <button class="btn btn-outline-secondary btn-sm" (click)="logout()">Logout</button>
  </div>

  <ng-template #loggedOut>
    <a class="btn btn-primary btn-sm me-2" routerLink="/login">Login</a>
    <a class="btn btn-success btn-sm" routerLink="/register">Register</a>
  </ng-template>
</nav>

<router-outlet></router-outlet>
